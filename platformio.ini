[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── 依赖库 ──────────────────────────────────────────────────────────────────
; ESP-MIDI (nativeusb=0 版本，仅 BLE)
lib_deps =
    lathoub/ESP32-BLE-MIDI @ ^0.3.2

; ── 编译选项 ────────────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=5          ; 开启详细串口日志（调试用）
    -DARDUINO_USB_MODE=0          ; 不使用 USB Host/Device

monitor_speed = 115200
